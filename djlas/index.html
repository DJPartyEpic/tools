<div id="text2"></div>
<div id="text3"></div>

<script>
  // Escape HTML to prevent XSS (recommended)
  function escapeHTML(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  // Update every second
  setInterval(function () {
    var txt2 = window.location.search.substring(1);
    var decodedTxt = decodeURIComponent(txt2); // replace %20 with space, etc.
    document.getElementById("text2").innerHTML = "<h3> Regular Text: " + escapeHTML(decodedTxt) + "</h3>";
    document.getElementById("text3").innerHTML = "<h3> Encoded Text: " + escapeHTML(txt2) + "</h3>";
  }, 1000);
</script>
